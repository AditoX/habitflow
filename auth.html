<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#e8e5de" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Habitflow" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <title>Sign in — Habitflow</title>
  <!-- OpenGraph / Social preview -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://habitflow.app/auth" />
  <meta property="og:title"       content="Sign in — Habitflow" />
  <meta property="og:description" content="Sign in to your Habitflow account and start building better habits today." />
  <meta property="og:image"       content="https://habitflow.app/icons/og-image.png" />
  <meta property="og:site_name"   content="Habitflow" />
  <meta name="twitter:card"       content="summary_large_image" />
  <meta name="twitter:title"      content="Sign in — Habitflow" />
  <meta name="twitter:description" content="Sign in to your Habitflow account and start building better habits today." />
  <meta name="twitter:image"      content="https://habitflow.app/icons/og-image.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/css/auth.css" />
  <script>
    const savedTheme = localStorage.getItem('habitflow-theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
  <style>
    html[data-theme="light"] :focus-visible {
      outline: 2px solid #111111;
      outline-offset: 3px;
      border-radius: 4px;
    }

    /* Theme Toggle Button */
    .theme-toggle {
      background: transparent;
      border: none;
      color: rgba(151,164,186,0.6);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      transition: color 0.15s, background 0.15s;
    }
    .theme-toggle:hover {
      color: #edf2f7;
      background: rgba(35,44,60,0.9);
    }
    .theme-toggle .sun-icon { display: none; }
    .theme-toggle .moon-icon { display: block; }
    html[data-theme="light"] .theme-toggle {
      color: rgba(17, 17, 17, 0.62);
    }
    html[data-theme="light"] .theme-toggle:hover {
      color: #111111;
      background: rgba(17, 17, 17, 0.05);
    }
    html[data-theme="light"] .theme-toggle .sun-icon { display: block; }
    html[data-theme="light"] .theme-toggle .moon-icon { display: none; }
  </style>
</head>
<body>

  <div class="auth-bg">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
  </div>

  <nav class="auth-nav" style="display: flex; justify-content: space-between; align-items: center;">
    <a href="/" class="nav-logo">Habitflow</a>
    <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
      <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
      <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>
  </nav>

  <main class="auth-shell">
    <div class="auth-card auth-card--centered">

      <div class="auth-logo-mark">H</div>

      <div class="auth-header">
        <h1>Welcome to Habitflow</h1>
        <p>Sign in to access your personal habit dashboard</p>
      </div>

      <div id="authError" class="auth-error" style="display:none"></div>

      <button class="btn-google" id="googleSignIn" aria-label="Continue with Google — sign in to Habitflow">
        <svg width="20" height="20" viewBox="0 0 18 18" fill="none">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <p class="auth-terms">By signing in you agree to keep building great habits.</p>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      signInWithPopup,
      GoogleAuthProvider,
      onAuthStateChanged,
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { firebaseConfig } from "./src/js/firebase-config.js";

    const app      = initializeApp(firebaseConfig);
    const auth     = getAuth(app);
    const provider = new GoogleAuthProvider();
    const googleBtn = document.getElementById("googleSignIn");
    const authError = document.getElementById("authError");

    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = "/dashboard";
    });

    function showError(msg) {
      authError.textContent = msg;
      authError.style.display = "block";
    }

    function friendlyError(code) {
      const map = {
        "auth/popup-closed-by-user":   "Sign-in was cancelled.",
        "auth/popup-blocked":          "Pop-up blocked. Please allow pop-ups for this site.",
        "auth/network-request-failed": "Network error. Check your connection.",
        "auth/too-many-requests":      "Too many attempts. Try again later.",
      };
      return map[code] || `Sign-in failed (${code || "unknown"}). Please try again.`;
    }

    const googleSVG = googleBtn.innerHTML;

    googleBtn.addEventListener("click", async () => {
      authError.style.display = "none";
      googleBtn.disabled = true;
      googleBtn.textContent = "Signing in…";
      try {
        await signInWithPopup(auth, provider);
        window.location.href = "/dashboard";
      } catch (err) {
        console.error("Firebase sign-in failed:", {
          code: err?.code,
          message: err?.message,
          customData: err?.customData,
        });
        showError(friendlyError(err.code));
        googleBtn.disabled = false;
        googleBtn.innerHTML = googleSVG;
      }
    });
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("/service-worker.js?v=20260408-2", { updateViaCache: "none" })
          .then((registration) => registration.update())
          .catch((error) => {
            console.warn("Service worker registration failed:", error);
          });
      });
    }
  </script>
  <script src="src/js/theme.js"></script>
</body>
</html>
