<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sign in — Habitflow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/css/auth.css" />
</head>
<body>

  <div class="auth-bg">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
  </div>

  <nav class="auth-nav">
    <a href="index.html" class="nav-logo">Habitflow</a>
  </nav>

  <main class="auth-shell">
    <div class="auth-card">
      <div class="auth-header">
        <h1 id="authTitle">Welcome back</h1>
        <p id="authSub">Sign in to your dashboard</p>
      </div>

      <div id="authError" class="auth-error" style="display:none"></div>

      <button class="btn-google" id="googleSignIn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="auth-divider"><span>or</span></div>

      <form class="auth-form" id="authForm" novalidate>
        <label class="auth-field">
          <span>Email</span>
          <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email" required />
        </label>
        <label class="auth-field">
          <span>Password</span>
          <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" required />
          <button type="button" class="pwd-toggle" id="pwdToggle" tabindex="-1">Show</button>
        </label>

        <div id="nameField" class="auth-field" style="display:none">
          <span>Display name</span>
          <input type="text" id="nameInput" placeholder="Your name" autocomplete="name" />
        </div>

        <button type="submit" class="btn-auth" id="submitBtn">Sign in</button>
      </form>

      <p class="auth-switch">
        <span id="switchText">Don't have an account?</span>
        <button class="link-btn" id="switchMode">Sign up</button>
      </p>

      <p class="auth-forgot" id="forgotRow">
        <button class="link-btn" id="forgotBtn">Forgot password?</button>
      </p>
    </div>
  </main>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      signInWithPopup,
      GoogleAuthProvider,
      sendPasswordResetEmail,
      onAuthStateChanged,
      updateProfile,
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    import { firebaseConfig } from "./src/js/firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Redirect if already signed in
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = "dashboard.html";
    });

    let isSignUp = false;

    const authTitle   = document.getElementById("authTitle");
    const authSub     = document.getElementById("authSub");
    const submitBtn   = document.getElementById("submitBtn");
    const switchText  = document.getElementById("switchText");
    const switchMode  = document.getElementById("switchMode");
    const nameField   = document.getElementById("nameField");
    const forgotRow   = document.getElementById("forgotRow");
    const authError   = document.getElementById("authError");
    const emailInput  = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const nameInput   = document.getElementById("nameInput");
    const pwdToggle   = document.getElementById("pwdToggle");
    const googleBtn   = document.getElementById("googleSignIn");

    function showError(msg) {
      authError.textContent = msg;
      authError.style.display = "block";
    }

    function clearError() {
      authError.style.display = "none";
      authError.textContent = "";
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      submitBtn.textContent = loading ? "Please wait…" : (isSignUp ? "Create account" : "Sign in");
      googleBtn.disabled = loading;
    }

    function friendlyError(code) {
      const map = {
        "auth/user-not-found": "No account found with this email.",
        "auth/wrong-password": "Incorrect password.",
        "auth/email-already-in-use": "An account with this email already exists.",
        "auth/weak-password": "Password must be at least 6 characters.",
        "auth/invalid-email": "Please enter a valid email address.",
        "auth/too-many-requests": "Too many attempts. Please try again later.",
        "auth/popup-closed-by-user": "Sign-in was cancelled.",
      };
      return map[code] || "Something went wrong. Please try again.";
    }

    switchMode.addEventListener("click", () => {
      isSignUp = !isSignUp;
      clearError();
      authTitle.textContent = isSignUp ? "Create account" : "Welcome back";
      authSub.textContent = isSignUp ? "Start your habit journey" : "Sign in to your dashboard";
      submitBtn.textContent = isSignUp ? "Create account" : "Sign in";
      switchText.textContent = isSignUp ? "Already have an account?" : "Don't have an account?";
      switchMode.textContent = isSignUp ? "Sign in" : "Sign up";
      nameField.style.display = isSignUp ? "grid" : "none";
      forgotRow.style.display = isSignUp ? "none" : "block";
      passwordInput.autocomplete = isSignUp ? "new-password" : "current-password";
    });

    pwdToggle.addEventListener("click", () => {
      const show = passwordInput.type === "password";
      passwordInput.type = show ? "text" : "password";
      pwdToggle.textContent = show ? "Hide" : "Show";
    });

    document.getElementById("authForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      clearError();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if (!email || !password) return showError("Please fill in all fields.");
      setLoading(true);
      try {
        if (isSignUp) {
          const cred = await createUserWithEmailAndPassword(auth, email, password);
          const name = nameInput.value.trim();
          if (name) await updateProfile(cred.user, { displayName: name });
        } else {
          await signInWithEmailAndPassword(auth, email, password);
        }
        window.location.href = "dashboard.html";
      } catch (err) {
        showError(friendlyError(err.code));
        setLoading(false);
      }
    });

    googleBtn.addEventListener("click", async () => {
      clearError();
      setLoading(true);
      try {
        await signInWithPopup(auth, provider);
        window.location.href = "dashboard.html";
      } catch (err) {
        showError(friendlyError(err.code));
        setLoading(false);
      }
    });

    document.getElementById("forgotBtn").addEventListener("click", async () => {
      const email = emailInput.value.trim();
      if (!email) return showError("Enter your email above first.");
      clearError();
      try {
        await sendPasswordResetEmail(auth, email);
        showError("✓ Reset email sent! Check your inbox.");
        authError.style.color = "#8fb8a2";
      } catch (err) {
        showError(friendlyError(err.code));
      }
    });
  </script>
</body>
</html>
